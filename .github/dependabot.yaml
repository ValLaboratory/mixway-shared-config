# https://docs.github.com/ja/code-security/how-tos/secure-your-supply-chain/manage-your-dependency-security/controlling-dependencies-updated

version: 2
updates:
    - package-ecosystem: "npm"
      directory: "/"
      schedule:
          interval: "weekly"
          day: "tuesday"
          time: "09:00"
          timezone: "Asia/Tokyo"
      labels:
          - dependencies
      cooldown:
          # 更新を30日間保留する (社内パッケージは除く)
          default-days: 30
          exclude:
              - "@vallaboratory/*"
      groups:
          minor-and-patch:
              patterns:
                  - "*"
              update-types:
                  - "minor"
                  - "patch"
