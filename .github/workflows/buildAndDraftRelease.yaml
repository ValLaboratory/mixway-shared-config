name: Build and Draft Release

on:
    push:
        branches:
            - main

permissions:
    contents: write
    pull-requests: read

jobs:
    build-release:
        # バージョンアップPR（タイトルが chore: bump version）がマージされた時のみ動きます
        if: "startsWith(github.event.head_commit.message, 'chore: bump version')"
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Setup Git user
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: "24"

            - name: Install and Build
              run: |
                  npm ci
                  npm run build

            - name: Get current version
              # package.jsonから最新のバージョン番号を読み取り、変数として保存します
              id: package-version
              run: echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_ENV

            - name: Commit dist to release branch
              run: |
                  # releaseブランチを作成（または切り替え）します
                  git switch -c release

                  # distフォルダは通常無視されるため、-fをつけて強制的に追加・コミットします
                  git add -f dist/
                  git commit -m "chore: add dist folder for v${{ env.VERSION }}"

                  # releaseブランチをGitHubにプッシュします
                  git push origin release --force
