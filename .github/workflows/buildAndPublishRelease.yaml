name: Build and Publish Release

on:
    push:
        branches:
            - main

permissions:
    contents: write

jobs:
    build-release:
        # バージョンアップPR（タイトルが chore: bump version）がマージされた時のみ動きます
        if: "startsWith(github.event.head_commit.message, 'chore: bump version')"
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Setup Node.js
              uses: ./.github/actions/setup-node

            - name: Setup Git user
              uses: ./.github/actions/setup-git-user

            - name: Build
              run: npm run build

            - name: Get current version
              id: package-version
              run: echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_ENV

            - name: Commit dist to release branch and Tag
              run: |
                  # releaseブランチを作成（または切り替え）します
                  git checkout -b release

                  # distフォルダを追加・コミットします
                  git add -f dist/
                  git commit -m "chore: add dist folder for v${{ env.VERSION }}"

                  # バージョン番号でタグを打ちます
                  git tag v${{ env.VERSION }}

                  # releaseブランチとタグをGitHubにプッシュします
                  git push origin release --force
                  git push origin v${{ env.VERSION }}

            - name: Publish Release
              # GitHub CLIを使ってリリースを公開します
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  gh release create "v${{ env.VERSION }}" \
                    --title "v${{ env.VERSION }}" \
                    --generate-notes
