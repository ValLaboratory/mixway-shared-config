name: Code Check
on: push

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - name: Use Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: "npm"
            - name: Install dependencies
              run: npm ci
            - name: Format
              run: npm run fmt:check
            - name: Lint
              run: npm run lint
            - name: Type Check
              run: npm run check
