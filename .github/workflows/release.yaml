name: Release package

on:
    push:
        branches:
            - main

permissions:
    contents: write

concurrency:
    group: release-package

jobs:
    check-status:
        runs-on: ubuntu-latest
        timeout-minutes: 15

        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Setup Node.js
              uses: ./.github/actions/setup-node

            # package.jsonのバージョンが更新され、リリース待ち状態になっているかどうか
            - name: Check if release is ready
              id: check-release-ready
              uses: ./.github/actions/check-release-ready

        outputs:
            ready: ${{ steps.check-release-ready.outputs.ready }}
            package-version: ${{ steps.check-release-ready.outputs.package-version }}

    release:
        runs-on: ubuntu-latest
        timeout-minutes: 15
        needs: check-status
        if: needs.check-status.outputs.ready == 'true'

        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Setup Node.js
              uses: ./.github/actions/setup-node

            - name: Setup Git user
              uses: ./.github/actions/setup-git-user

            - name: Build package
              run: npm run build

            - name: Commit dist and create tag
              env:
                  VERSION: ${{ needs.check-status.outputs.package-version }}
              run: |
                  # distフォルダをステージングしてコミット（.gitignoreで除外されているため-fで強制追加）
                  git add -f dist/
                  git commit -m "release v${VERSION}"

                  # バージョン番号でタグを打つ
                  git tag "v${VERSION}"

                  # タグのみプッシュ（ブランチはプッシュしない）
                  git push origin "v${VERSION}"

            - name: Create GitHub Release
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  VERSION: ${{ needs.check-status.outputs.package-version }}
              run: |
                  gh release create "v${VERSION}" \
                    --title "v${VERSION}" \
                    --generate-notes
