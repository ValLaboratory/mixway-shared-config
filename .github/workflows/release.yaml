# パッケージのリリースを行うワークフロー

name: Release package

on:
    push:
        branches:
            - main

permissions:
    contents: write

concurrency:
    group: release-package

jobs:
    check-status:
        runs-on: ubuntu-latest
        timeout-minutes: 15

        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Setup Node.js
              uses: ./.github/actions/setup-node

            # package.jsonのバージョンが更新され、リリース待ち状態になっているかどうか
            - name: Check if release is ready
              id: check-release-ready
              uses: ./.github/actions/check-release-ready

        outputs:
            ready: ${{ steps.check-release-ready.outputs.ready }}
            next-version: ${{ steps.check-release-ready.outputs.package-version }}
            previous-version: ${{ steps.check-release-ready.outputs.release-version }}

    release:
        runs-on: ubuntu-latest
        timeout-minutes: 15
        needs: check-status
        if: needs.check-status.outputs.ready == 'true'

        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Setup Node.js
              uses: ./.github/actions/setup-node

            - name: Setup Git user
              uses: ./.github/actions/setup-git-user

            - name: Build package
              run: npm run build

            - name: Commit dist and create tag
              env:
                  NEXT_VERSION: ${{ needs.check-status.outputs.next-version }}
              run: |
                  # distフォルダをステージングしてコミット（.gitignoreで除外されているため-fで強制追加）
                  git add -f dist/
                  git commit -m "release v${NEXT_VERSION}"

                  # バージョン番号でタグを打つ（既存の場合は上書き）
                  git tag -f "v${NEXT_VERSION}"

                  # タグのみプッシュ（ブランチはプッシュしない、既存タグも更新）
                  git push origin "v${NEXT_VERSION}" --force

            - name: Create GitHub Release
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  NEXT_VERSION: ${{ needs.check-status.outputs.next-version }}
                  PREVIOUS_VERSION: ${{ needs.check-status.outputs.previous-version }}
              run: |
                  gh release create "v${NEXT_VERSION}" \
                    --generate-notes \
                    --notes-start-tag "v${PREVIOUS_VERSION}" \
                    --verify-tag
