name: Get latest release version
description: GitHubリリースの最新バージョンを取得するComposite Action

outputs:
    version:
        description: "最新リリースのバージョン（例: 0.13.0）。リリースが存在しない場合は空文字列"
        value: ${{ steps.version.outputs.version }}

runs:
    using: composite
    steps:
        - name: Get latest release version
          id: version
          shell: bash
          run: |
              # 最新のリリースタグを取得（ドラフトは除外される）
              TAG=$(gh release view --json tagName --jq '.tagName' 2>/dev/null || echo "")

              # vプレフィックスを除去してバージョン番号のみにする
              VERSION="${TAG#v}"

              echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
